name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
        continue-on-error: true
      - name: Create lint issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "[lint] 代码风格问题" \
            --body "CI lint 检查失败，请修复：${{ github.run_url }}" \
            --label "lint"

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci && cd web && npm ci
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci && cd web && npm ci
      - run: npm run test

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci && cd web && npm ci
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: cd web && npm ci

      - name: Install Playwright browsers
        run: cd web && npx playwright install --with-deps chromium

      - name: Start dev server
        env:
          NODE_ENV: development
        # Redirect to a file so we can tail it on failure
        run: cd web && npm run dev -- -p 3001 &> /tmp/nextjs-dev.log &

      - name: Wait for dev server to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3001 > /dev/null 2>&1; then
              echo "Dev server ready after ${i}s"
              exit 0
            fi
            printf '.'
            sleep 1
          done
          echo ""
          echo "Dev server failed to start. Last 50 lines of log:"
          tail -50 /tmp/nextjs-dev.log
          exit 1

      - name: Run E2E tests
        env:
          E2E_BASE_URL: http://localhost:3001
          CI: 'true'
        run: cd web && npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

      - name: Upload test-results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: web/test-results/
          retention-days: 7

      - name: Upload dev server log on failure
        if: failure()
        run: cat /tmp/nextjs-dev.log
